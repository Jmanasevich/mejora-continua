<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MC Dashboard - In Situ</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com/"></script>
<style>
body{font-family:sans-serif;background:#f8fafc}
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:12px;font-weight:600}
.card{background:white;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);padding:16px;margin-bottom:12px}
.progress-bar{height:8px;background:#e2e8f0;border-radius:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:4px}
.btn{padding:8px 16px;border-radius:8px;font-weight:600;cursor:pointer;font-size:14px;border:none}
.btn-primary{background:#2563eb;color:white}
.btn-primary:hover{background:#1d4ed8}
.btn-secondary{background:#f1f5f9;color:#475569}
.btn-secondary:hover{background:#e2e8f0}
.btn-danger{background:#fee2e2;color:#991b1b}
.btn-danger:hover{background:#fecaca}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:50;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:white;border-radius:16px;padding:24px;width:100%;max-width:800px;max-height:90vh;overflow-y:auto}
input,select,textarea{display:block;width:100%;padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;box-sizing:border-box}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.tab-active{border-bottom:3px solid #2563eb;color:#2563eb;font-weight:700}
.tab-inactive{border-bottom:3px solid transparent;color:#64748b;font-weight:400}
.member-chip{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:20px;font-size:12px;color:#1e40af;font-weight:500}
.member-chip button{background:none;border:none;color:#dc2626;cursor:pointer;font-size:14px;padding:0;line-height:1}
.task-row{padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;margin-bottom:6px;background:#fafafa}
.task-row:hover{background:#f1f5f9}
.task-overdue{border-left:3px solid #ef4444}
.task-complete{border-left:3px solid #22c55e;opacity:0.8}
.task-blocked{border-left:3px solid #f59e0b}
.dropdown-menu{position:absolute;top:100%;left:0;right:0;background:white;border:1px solid #e2e8f0;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);max-height:200px;overflow-y:auto;z-index:60}
.dropdown-item{padding:8px 12px;cursor:pointer;font-size:13px;display:flex;align-items:center;gap:8px}
.dropdown-item:hover{background:#eff6ff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;
const API="https://script.google.com/macros/s/AKfycbzpXyst3RD8yJcAl9OqKuYudQw40e45cYbt6nCcT8cSGcF5l863adi24-1O-swkHgSCmw/exec";
const ESTADOS=["No Iniciada","En Progreso","Completada","Bloqueada","Archivada"];
const PRIOS=["Alta","Media","Baja"];
const AREAS=["Operaciones","Calidad","Enologia","Produccion","Finanzas","Logistica","Comercial","RRHH"];
const TASK_ESTADOS=["Pendiente","En Progreso","Completada","Bloqueada"];

function sem(i){const h=new Date(),f=new Date(i.fechaCompromiso),a=Number(i.avance)||0;if(i.estado==="Completada")return"ok";if(i.estado==="Bloqueada")return"err";if(f<h&&a<100)return"err";return((f-h)/864e5)<14&&a<70?"warn":"ok";}
function cE(e){return e==="Completada"?{background:"#dcfce7",color:"#166534"}:e==="En Progreso"?{background:"#fef9c3",color:"#854d0e"}:e==="Bloqueada"?{background:"#fee2e2",color:"#991b1b"}:{background:"#f1f5f9",color:"#475569"};}
function cP(p){return p==="Alta"?{background:"#fee2e2",color:"#991b1b"}:p==="Media"?{background:"#fef9c3",color:"#854d0e"}:{background:"#dcfce7",color:"#166534"};}
function cT(e){return e==="Completada"?{bg:"#dcfce7",color:"#166534",icon:"\u2705"}:e==="En Progreso"?{bg:"#fef9c3",color:"#854d0e",icon:"\u23F3"}:e==="Bloqueada"?{bg:"#fee2e2",color:"#991b1b",icon:"\u26D4"}:{bg:"#f1f5f9",color:"#475569",icon:"\u23F8"};}
function Dot({s}){return <span style={{fontSize:18}}>{s==="ok"?"\u{1F7E2}":s==="warn"?"\u{1F7E1}":"\u{1F534}"}</span>;}
function isOverdue(d){if(!d)return false;return new Date(d)<new Date();}
function calcAvance(tareas){if(!tareas||tareas.length===0)return 0;const done=tareas.filter(t=>t.estado==="Completada").length;return Math.round((done/tareas.length)*100);}

function App(){
const[tab,sTab]=useState("board"),[ini,sIni]=useState([]),[per,sPer]=useState([]),[load,sLoad]=useState(true),[apiOk,sApiOk]=useState(null),[q,sQ]=useState(""),[fE,sFE]=useState(""),[showF,sShowF]=useState(false),[edit,sEdit]=useState(null),[showP,sShowP]=useState(false),[editP,sEditP]=useState(null),[toast,sToast]=useState(null);
const msg=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3500);};
const fetch2=useCallback(async()=>{sLoad(true);try{const r=await fetch(API+"?action=getAll");const d=await r.json();if(d.success){sIni(d.data.iniciativas||[]);sPer(d.data.personas||[]);sApiOk(true);}else sApiOk(false);}catch{sApiOk(false);try{const l=localStorage.getItem("mc_i");if(l)sIni(JSON.parse(l));}catch{}try{const l=localStorage.getItem("mc_p");if(l)sPer(JSON.parse(l));}catch{}}sLoad(false);},[]);
useEffect(()=>{fetch2();},[fetch2]);

const saveI=async(item)=>{try{if(!item.id)item.id=Date.now().toString();const allTasks=(item.tareas||[]);item.avance=calcAvance(allTasks);item.historial=(item.historial||"")+"|"+new Date().toLocaleString("es-CL")+":OK";await fetch(API,{method:"POST",body:JSON.stringify({action:"saveIniciativa",iniciativa:item})});await fetch2();msg("Guardada ok");}catch{const l=[...ini];const i=l.findIndex(x=>x.id==item.id);if(i>=0)l[i]=item;else l.push(item);sIni(l);localStorage.setItem("mc_i",JSON.stringify(l));msg("Local","warn");}sShowF(false);sEdit(null);};
const saveP=async(p)=>{try{if(!p.id)p.id="p"+Date.now();await fetch(API,{method:"POST",body:JSON.stringify({action:"savePersona",persona:p})});await fetch2();msg("OK");}catch{const l=[...per];const i=l.findIndex(x=>x.id==p.id);if(i>=0)l[i]=p;else l.push(p);sPer(l);localStorage.setItem("mc_p",JSON.stringify(l));}sEditP(null);};
const filtradas=ini.filter(i=>{const qq=q.toLowerCase();return(!qq||i.nombre?.toLowerCase().includes(qq)||i.responsable?.toLowerCase().includes(qq))&&(!fE||i.estado===fE);});
const venc=ini.filter(i=>{const h=new Date(),f=new Date(i.fechaCompromiso);return f<h&&i.estado!=="Completada"&&i.estado!=="Archivada";});
const gmail=(i)=>{const pp=per.find(x=>x.nombre===i.responsable);window.open("https://mail.google.com/mail/?view=cm&to="+(pp?.email||"")+"&su="+encodeURIComponent("[MC] "+i.nombre)+"&body="+encodeURIComponent("Hola "+i.responsable+",\nIniciativa: "+i.nombre+"\nEstado: "+i.estado+"\nAvance: "+(i.avance||0)+"%"),"_blank");};
const acti=ini.filter(i=>i.estado!=="Archivada");
const grupos=ESTADOS.filter(e=>e!=="Archivada").map(estado=>({estado,items:filtradas.filter(i=>i.estado===estado)}));
const allTasks=useMemo(()=>{const tasks=[];ini.forEach(i=>{(i.tareas||[]).forEach(t=>{tasks.push({...t,iniciativa:i.nombre,iniId:i.id});});});return tasks;},[ini]);
const overdueTasks=allTasks.filter(t=>t.estado!=="Completada"&&isOverdue(t.fechaFin));

if(load)return <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",flexDirection:"column"}}><div style={{fontSize:48}}>\u2699\uFE0F</div><p>Cargando...</p></div>;
return(<div style={{minHeight:"100vh",background:"#f8fafc"}}>
<div style={{background:"white",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:40}}>
<div style={{maxWidth:1280,margin:"0 auto",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
<div><h1 style={{fontSize:20,fontWeight:800,margin:0}}>\u{1F3ED} Comit\u00E9 Mejora Continua</h1><p style={{fontSize:12,color:"#94a3b8",margin:0}}>In Situ Wines \u00B7 {acti.length} iniciativas</p></div>
<div style={{display:"flex",gap:8,alignItems:"center"}}>
<span style={{fontSize:12,padding:"4px 12px",borderRadius:20,...(apiOk?{background:"#dcfce7",color:"#166534"}:{background:"#fee2e2",color:"#991b1b"})}}>{apiOk?"\u25CF Sheets \u2713":"\u25CF Modo local"}</span>
<button className="btn btn-secondary" onClick={()=>sShowP(true)}>\u{1F465} Personas</button>
<button className="btn btn-primary" onClick={()=>{sEdit(null);sShowF(true);}}>+ Nueva</button>
</div></div>
<div style={{maxWidth:1280,margin:"0 auto",padding:"0 20px",display:"flex",gap:4,borderTop:"1px solid #f1f5f9"}}>
{[["board","\u{1F4CB} Board"],["tabla","\u{1F4CA} Tabla"],["tareas","\u2705 Tareas"],["alertas","\u{1F6A8} Alertas"+(venc.length+overdueTasks.length?" ("+(venc.length+overdueTasks.length)+")":"")]].map(([k,v])=>(
<button key={k} onClick={()=>sTab(k)} style={{padding:"10px 12px",background:"none",border:"none",borderBottom:tab===k?"3px solid #2563eb":"3px solid transparent",color:tab===k?"#2563eb":"#64748b",fontWeight:tab===k?700:400,cursor:"pointer",fontSize:14}}>{v}</button>
))}</div></div>

<div style={{maxWidth:1280,margin:"0 auto",padding:"16px 20px"}}>
<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
<input style={{flex:1,minWidth:200}} placeholder="\u{1F50D} Buscar..." value={q} onChange={e=>sQ(e.target.value)}/>
<select style={{width:170}} value={fE} onChange={e=>sFE(e.target.value)}><option value="">Todos estados</option>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select>
<button className="btn btn-secondary" onClick={fetch2}>\u21BB Sync</button>
</div>

<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
{[["Total",acti.length,"#eff6ff","#1e40af"],["En Progreso",ini.filter(i=>i.estado==="En Progreso").length,"#fefce8","#92400e"],["Completadas",ini.filter(i=>i.estado==="Completada").length,"#f0fdf4","#14532d"],["Vencidas",venc.length,"#fef2f2","#991b1b"]].map(([l,v,bg,c])=>(
<div key={l} style={{background:bg,borderRadius:14,padding:"16px 20px",textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:13,color:c,fontWeight:600,marginTop:4}}>{l}</div></div>
))}</div>
{tab==="board"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16}}>
{grupos.map(({estado,items})=>(<div key={estado}>
<div className="badge" style={{width:"100%",textAlign:"center",padding:"8px",marginBottom:10,display:"block",...cE(estado)}}>{estado} ({items.length})</div>
{items.map(i=>{const taskCount=(i.tareas||[]).length;const taskDone=(i.tareas||[]).filter(t=>t.estado==="Completada").length;const taskOverdue=(i.tareas||[]).filter(t=>t.estado!=="Completada"&&isOverdue(t.fechaFin)).length;
return(<div key={i.id} className="card" style={{cursor:"pointer"}} onClick={()=>{sEdit(i);sShowF(true);}}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span className="badge" style={cP(i.prioridad)}>{i.prioridad}</span><Dot s={sem(i)}/></div>
<p style={{fontWeight:600,fontSize:13,marginBottom:4}}>{i.nombre}</p>
<p style={{fontSize:12,color:i.responsable?"#64748b":"#f87171",marginBottom:8}}>{i.responsable||"\u26A0\uFE0F Sin responsable"}</p>
{(i.equipo||[]).length>0&&<p style={{fontSize:10,color:"#2563eb",marginBottom:4}}>\u{1F465} {(i.equipo||[]).length} miembros</p>}
{taskCount>0&&<div style={{fontSize:10,color:"#64748b",marginBottom:4,display:"flex",gap:8}}>
<span>\u2705 {taskDone}/{taskCount} tareas</span>
{taskOverdue>0&&<span style={{color:"#ef4444"}}>\u{1F534} {taskOverdue} vencidas</span>}
</div>}
<div className="progress-bar"><div className="progress-fill" style={{width:(i.avance||0)+"%",background:"#3b82f6"}}></div></div>
<p style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{i.avance||0}% \u00B7 {i.fechaCompromiso}</p>
</div>);})}
</div>))}</div>}

{tab==="tabla"&&<div className="card" style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
<thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>
{["","Iniciativa","Responsable","Equipo","Tareas","Estado","Avance","Fecha",""].map(h=><th key={h} style={{padding:"12px 14px",textAlign:"left",fontWeight:600,color:"#475569"}}>{h}</th>)}
</tr></thead><tbody>
{filtradas.filter(i=>i.estado!=="Archivada").map((i,idx)=>{const tc=(i.tareas||[]).length;const td=(i.tareas||[]).filter(t=>t.estado==="Completada").length;
return(<tr key={i.id} style={{borderBottom:"1px solid #f1f5f9",background:idx%2===0?"white":"#fafafa"}}>
<td style={{padding:"10px 14px"}}><Dot s={sem(i)}/></td>
<td style={{padding:"10px 14px",fontWeight:600}}>{i.nombre}</td>
<td style={{padding:"10px 14px",color:i.responsable?"#475569":"#f87171"}}>{i.responsable||"Sin asignar"}</td>
<td style={{padding:"10px 14px",fontSize:11,color:"#2563eb"}}>{(i.equipo||[]).length>0?(i.equipo||[]).length+" miembros":"-"}</td>
<td style={{padding:"10px 14px",fontSize:11}}>{tc>0?td+"/"+tc:"-"}</td>
<td style={{padding:"10px 14px"}}><span className="badge" style={cE(i.estado)}>{i.estado}</span></td>
<td style={{padding:"10px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div className="progress-bar" style={{width:60}}><div className="progress-fill" style={{width:(i.avance||0)+"%",background:"#3b82f6"}}></div></div><span style={{fontSize:11,color:"#94a3b8"}}>{i.avance||0}%</span></div></td>
<td style={{padding:"10px 14px",color:"#94a3b8",fontSize:12}}>{i.fechaCompromiso}</td>
<td style={{padding:"10px 14px"}}><div style={{display:"flex",gap:6}}>
<button className="btn btn-secondary" style={{padding:"4px 10px",fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>\u270F\uFE0F</button>
<button className="btn btn-secondary" style={{padding:"4px 10px",fontSize:12}} onClick={()=>gmail(i)}>\u2709\uFE0F</button>
</div></td></tr>);})}
</tbody></table></div>}

{tab==="tareas"&&<div>
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>
{[["Total",allTasks.length,"#eff6ff","#1e40af"],["Completadas",allTasks.filter(t=>t.estado==="Completada").length,"#f0fdf4","#14532d"],["Vencidas",overdueTasks.length,"#fef2f2","#991b1b"],["Bloqueadas",allTasks.filter(t=>t.estado==="Bloqueada").length,"#fefce8","#92400e"]].map(([l,v,bg,c])=>(
<div key={l} style={{background:bg,borderRadius:14,padding:"12px 16px",textAlign:"center"}}><div style={{fontSize:28,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:12,color:c,fontWeight:600,marginTop:2}}>{l}</div></div>
))}</div>
<div className="card" style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
<thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>
{["Estado","Tarea","Responsable","Iniciativa","F.Inicio","F.T\u00E9rmino",""].map(h=><th key={h} style={{padding:"10px 12px",textAlign:"left",fontWeight:600,color:"#475569"}}>{h}</th>)}
</tr></thead><tbody>
{allTasks.sort((a,b)=>{const pa={Bloqueada:0,Pendiente:1,"En Progreso":2,Completada:3};return(pa[a.estado]||0)-(pa[b.estado]||0);}).map((t,idx)=>{
const od=t.estado!=="Completada"&&isOverdue(t.fechaFin);const ct=cT(t.estado);
return(<tr key={t.id||idx} style={{borderBottom:"1px solid #f1f5f9",background:od?"#fef2f2":idx%2===0?"white":"#fafafa"}}>
<td style={{padding:"8px 12px"}}><span className="badge" style={{background:ct.bg,color:ct.color}}>{ct.icon} {t.estado}</span></td>
<td style={{padding:"8px 12px",fontWeight:500}}>{t.titulo||t.desc||"Sin t\u00EDtulo"}{od&&<span style={{fontSize:10,color:"#ef4444",marginLeft:6}}>\u26A0 VENCIDA</span>}</td>
<td style={{padding:"8px 12px",color:"#64748b"}}>{t.responsable||"-"}</td>
<td style={{padding:"8px 12px",color:"#2563eb",fontSize:12}}>{t.iniciativa}</td>
<td style={{padding:"8px 12px",color:"#94a3b8",fontSize:12}}>{t.fechaInicio||"-"}</td>
<td style={{padding:"8px 12px",color:od?"#ef4444":"#94a3b8",fontSize:12,fontWeight:od?600:400}}>{t.fechaFin||"-"}</td>
<td style={{padding:"8px 12px"}}><button className="btn btn-secondary" style={{padding:"2px 8px",fontSize:11}} onClick={()=>{const found=ini.find(i=>i.id===t.iniId);if(found){sEdit(found);sShowF(true);}}}>\u270F\uFE0F</button></td>
</tr>);})}
</tbody></table></div></div>}

{tab==="alertas"&&<div>
<h2 style={{fontWeight:700,color:"#991b1b",marginBottom:12}}>\u{1F534} Iniciativas Vencidas/Bloqueadas</h2>
{venc.length===0&&ini.filter(i=>i.estado==="Bloqueada").length===0?<div className="card" style={{textAlign:"center",color:"#166534",background:"#f0fdf4",padding:40}}>\u2705 Sin alertas de iniciativas</div>:
[...new Map([...venc,...ini.filter(i=>i.estado==="Bloqueada")].map(i=>[i.id,i])).values()].map(i=>(
<div key={i.id} className="card" style={{borderLeft:"4px solid #f87171",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
<div><p style={{fontWeight:700,margin:"0 0 4px"}}>{i.nombre}</p><p style={{fontSize:13,color:"#64748b",margin:0}}>{i.responsable||"Sin responsable"} \u00B7 {i.fechaCompromiso} \u00B7 {i.avance||0}%</p></div>
<div style={{display:"flex",gap:8,marginLeft:12}}>
<button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>\u270F\uFE0F</button>
<button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>gmail(i)}>\u2709\uFE0F</button>
</div></div>))}

{overdueTasks.length>0&&<><h2 style={{fontWeight:700,color:"#dc2626",margin:"24px 0 12px"}}>\u{1F534} Tareas Vencidas ({overdueTasks.length})</h2>
{overdueTasks.map((t,i)=>(
<div key={t.id||i} className="card" style={{borderLeft:"4px solid #ef4444",padding:"10px 16px"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div><p style={{fontWeight:600,margin:"0 0 2px",fontSize:13}}>{t.titulo||t.desc}</p>
<p style={{fontSize:12,color:"#64748b",margin:0}}>{t.responsable||"Sin asignar"} \u00B7 Iniciativa: {t.iniciativa} \u00B7 Vence: {t.fechaFin}</p></div>
<button className="btn btn-secondary" style={{fontSize:11}} onClick={()=>{const found=ini.find(x=>x.id===t.iniId);if(found){sEdit(found);sShowF(true);}}}>\u270F\uFE0F</button>
</div></div>))}</>}

<h2 style={{fontWeight:700,color:"#92400e",margin:"24px 0 12px"}}>\u26A0\uFE0F Sin responsable</h2>
{ini.filter(i=>!i.responsable&&i.estado!=="Archivada").length===0?<div className="card" style={{textAlign:"center",color:"#166534",background:"#f0fdf4",padding:20}}>\u2705 Todas asignadas</div>:
ini.filter(i=>!i.responsable&&i.estado!=="Archivada").map(i=>(
<div key={i.id} className="card" style={{borderLeft:"4px solid #fbbf24",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div><p style={{fontWeight:700,margin:"0 0 4px"}}>{i.nombre}</p><p style={{fontSize:13,color:"#64748b",margin:0}}>{i.area} \u00B7 {i.estado}</p></div>
<button className="btn btn-primary" style={{fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>Asignar</button>
</div>))}
</div>}
</div>

{showF&&<FormI ini={edit} per={per} onSave={saveI} onClose={()=>{sShowF(false);sEdit(null);}} onGmail={gmail}/>}

{showP&&<div className="modal-overlay" onClick={()=>sShowP(false)}><div className="modal" style={{maxWidth:700}} onClick={e=>e.stopPropagation()}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<h2 style={{fontWeight:800,fontSize:18,margin:0}}>\u{1F465} Directorio</h2>
<div style={{display:"flex",gap:8}}><button className="btn btn-primary" style={{fontSize:13}} onClick={()=>sEditP({})}>+ Agregar</button>
<button onClick={()=>sShowP(false)} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:"#94a3b8"}}>\u00D7</button></div></div>
<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>
{per.map(p=>(<div key={p.id} className="card" style={{margin:0,display:"flex",justifyContent:"space-between"}}>
<div><p style={{fontWeight:700,margin:"0 0 2px"}}>{p.nombre}</p><p style={{fontSize:12,color:"#64748b",margin:"0 0 2px"}}>{p.rol}</p>
<p style={{fontSize:12,color:"#2563eb",margin:0}}>{p.email||<span style={{color:"#f87171"}}>Sin email</span>}</p></div>
<button className="btn btn-secondary" style={{fontSize:12,padding:"4px 8px"}} onClick={()=>sEditP(p)}>\u270F\uFE0F</button>
</div>))}</div>
{editP!==null&&<FormP per={editP} onSave={saveP} onClose={()=>sEditP(null)}/>}
</div></div>}

{toast&&<div style={{position:"fixed",bottom:28,right:28,padding:"14px 24px",borderRadius:14,fontWeight:700,fontSize:14,zIndex:100,background:toast.t==="ok"?"#16a34a":"#d97706",color:"white"}}>{toast.m}</div>}
</div>);
}

function MemberSelector({per,equipo,onAdd}){
const[open,sOpen]=useState(false);const[search,sSearch]=useState("");
const available=per.filter(p=>!(equipo||[]).find(m=>m.id===p.id));
const filtered=available.filter(p=>!search||p.nombre?.toLowerCase().includes(search.toLowerCase())||p.rol?.toLowerCase().includes(search.toLowerCase()));
return(<div style={{position:"relative"}}>
<button className="btn btn-primary" style={{fontSize:12,padding:"4px 12px"}} onClick={()=>sOpen(!open)}>+ Agregar Miembro</button>
{open&&<div className="dropdown-menu" style={{width:300,right:0,left:"auto"}}>
<div style={{padding:8}}><input placeholder="Buscar persona..." value={search} onChange={e=>sSearch(e.target.value)} style={{fontSize:12}} autoFocus/></div>
{filtered.length===0?<div style={{padding:"12px",textAlign:"center",color:"#94a3b8",fontSize:12}}>No hay personas disponibles</div>:
filtered.map(p=>(<div key={p.id} className="dropdown-item" onClick={()=>{onAdd(p);sOpen(false);sSearch("");}}>
<div style={{width:28,height:28,borderRadius:"50%",background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,color:"#2563eb"}}>{p.nombre?.charAt(0)}</div>
<div><div style={{fontWeight:600,fontSize:12}}>{p.nombre}</div><div style={{fontSize:11,color:"#94a3b8"}}>{p.rol}</div></div>
</div>))}
</div>}
</div>);
}

function FormI({ini,per,onSave,onClose,onGmail}){
const E={nombre:"",responsable:"",area:"Operaciones",prioridad:"Alta",estado:"No Iniciada",avance:0,fechaCompromiso:"",observaciones:"",equipo:[],tareas:[]};
const[f,sF]=useState(ini?{...ini,equipo:Array.isArray(ini.equipo)?ini.equipo:[],tareas:Array.isArray(ini.tareas)?ini.tareas:[]}:E);
const[formTab,sFormTab]=useState("info");
const set=(k,v)=>sF(x=>({...x,[k]:v}));

const addMember=(p)=>{sF(x=>({...x,equipo:[...(x.equipo||[]),{id:p.id,nombre:p.nombre,rol:p.rol,email:p.email}]}));};
const rmMember=(id)=>{sF(x=>({...x,equipo:(x.equipo||[]).filter(m=>m.id!==id),tareas:(x.tareas||[]).map(t=>t.responsableId===id?{...t,responsable:"",responsableId:""}:t)}));};

const addTask=()=>{sF(x=>({...x,tareas:[...(x.tareas||[]),{id:Date.now().toString(),titulo:"",responsable:"",responsableId:"",fechaInicio:"",fechaFin:"",estado:"Pendiente",notas:""}]}));};
const rmTask=(tid)=>{sF(x=>({...x,tareas:(x.tareas||[]).filter(t=>t.id!==tid)}));};
const upTask=(tid,k,v)=>{sF(x=>({...x,tareas:(x.tareas||[]).map(t=>t.id===tid?{...t,[k]:v}:t)}));};
const assignTask=(tid,mid)=>{const m=(f.equipo||[]).find(x=>x.id===mid);sF(x=>({...x,tareas:(x.tareas||[]).map(t=>t.id===tid?{...t,responsable:m?m.nombre:"",responsableId:mid}:t)}));};

const taskCount=(f.tareas||[]).length;
const taskDone=(f.tareas||[]).filter(t=>t.estado==="Completada").length;
const autoAvance=taskCount>0?Math.round((taskDone/taskCount)*100):(f.avance||0);

return(<div className="modal-overlay" onClick={onClose}><div className="modal" style={{maxWidth:800}} onClick={e=>e.stopPropagation()}>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:12}}>
<h2 style={{fontWeight:800,fontSize:18,margin:0}}>{ini?"\u270F\uFE0F Editar":"+ Nueva iniciativa"}</h2>
<button onClick={onClose} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:"#94a3b8"}}>\u00D7</button>
</div>

<div style={{display:"flex",gap:4,marginBottom:16,borderBottom:"1px solid #e2e8f0"}}>
{[["info","\u{1F4CB} Info"],["equipo","\u{1F465} Equipo ("+(f.equipo||[]).length+")"],["tareas","\u2705 Tareas ("+taskCount+")"]].map(([k,v])=>(
<button key={k} onClick={()=>sFormTab(k)} style={{padding:"8px 14px",background:"none",border:"none",borderBottom:formTab===k?"3px solid #2563eb":"3px solid transparent",color:formTab===k?"#2563eb":"#64748b",fontWeight:formTab===k?700:400,cursor:"pointer",fontSize:13}}>{v}</button>
))}</div>

{formTab==="info"&&<div style={{display:"grid",gap:12}}>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Nombre *</label><input value={f.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Nombre de la iniciativa"/></div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Responsable</label><select value={f.responsable} onChange={e=>set("responsable",e.target.value)}><option value="">Sin asignar</option>{per.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}</select></div>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>\u00C1rea</label><select value={f.area} onChange={e=>set("area",e.target.value)}>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Estado</label><select value={f.estado} onChange={e=>set("estado",e.target.value)}>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Prioridad</label><select value={f.prioridad} onChange={e=>set("prioridad",e.target.value)}>{PRIOS.map(pp=><option key={pp}>{pp}</option>)}</select></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Avance: {taskCount>0?autoAvance:(f.avance||0)}%{taskCount>0&&<span style={{fontSize:11,color:"#2563eb",marginLeft:6}}>(auto: {taskDone}/{taskCount} tareas)</span>}</label>
{taskCount===0?<input type="range" min="0" max="100" value={f.avance||0} onChange={e=>set("avance",Number(e.target.value))} style={{border:"none",padding:"8px 0",background:"none",width:"100%"}}/>:
<div className="progress-bar" style={{height:12,marginTop:8}}><div className="progress-fill" style={{width:autoAvance+"%",background:autoAvance===100?"#22c55e":"#3b82f6"}}></div></div>}
</div>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Fecha Compromiso</label><input type="date" value={f.fechaCompromiso} onChange={e=>set("fechaCompromiso",e.target.value)}/></div>
</div>
<div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Observaciones</label><textarea value={f.observaciones} onChange={e=>set("observaciones",e.target.value)} rows={3}/></div>
</div>}

{formTab==="equipo"&&<div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<div><h3 style={{margin:0,fontSize:15,fontWeight:700}}>\u{1F465} Equipo de Trabajo</h3>
<p style={{margin:"4px 0 0",fontSize:12,color:"#94a3b8"}}>Selecciona miembros del directorio para esta iniciativa</p></div>
<MemberSelector per={per} equipo={f.equipo} onAdd={addMember}/>
</div>

{(f.equipo||[]).length===0?<div style={{textAlign:"center",padding:40,color:"#94a3b8",background:"#f8fafc",borderRadius:12}}>
<div style={{fontSize:40,marginBottom:8}}>\u{1F465}</div>
<p style={{fontWeight:600,margin:"0 0 4px"}}>Sin miembros a\u00FAn</p>
<p style={{fontSize:12,margin:0}}>Usa el bot\u00F3n \u0022+ Agregar Miembro\u0022 para seleccionar personas del directorio</p>
</div>:
<div style={{display:"grid",gap:8}}>
{(f.equipo||[]).map(m=>{const memberTasks=(f.tareas||[]).filter(t=>t.responsableId===m.id);const mtDone=memberTasks.filter(t=>t.estado==="Completada").length;
return(<div key={m.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:"white",border:"1px solid #e2e8f0",borderRadius:10}}>
<div style={{display:"flex",alignItems:"center",gap:12}}>
<div style={{width:36,height:36,borderRadius:"50%",background:"#eff6ff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:"#2563eb"}}>{m.nombre?.charAt(0)}</div>
<div><p style={{fontWeight:600,margin:0,fontSize:13}}>{m.nombre}</p><p style={{fontSize:11,color:"#64748b",margin:0}}>{m.rol}</p></div>
</div>
<div style={{display:"flex",alignItems:"center",gap:12}}>
{memberTasks.length>0&&<span style={{fontSize:11,color:"#64748b"}}>{mtDone}/{memberTasks.length} tareas</span>}
<button className="btn btn-danger" style={{fontSize:11,padding:"4px 10px"}} onClick={()=>rmMember(m.id)}>\u2715 Quitar</button>
</div></div>);})}
</div>}
</div>}

{formTab==="tareas"&&<div>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
<div><h3 style={{margin:0,fontSize:15,fontWeight:700}}>\u2705 Tareas</h3>
<p style={{margin:"4px 0 0",fontSize:12,color:"#94a3b8"}}>Avance autom\u00E1tico: {taskDone}/{taskCount} completadas = {autoAvance}%</p></div>
<button className="btn btn-primary" style={{fontSize:12}} onClick={addTask}>+ Nueva Tarea</button>
</div>

{taskCount>0&&<div style={{display:"flex",gap:12,marginBottom:16}}>
{TASK_ESTADOS.map(e=>{const ct=cT(e);const count=(f.tareas||[]).filter(t=>t.estado===e).length;
return <div key={e} style={{flex:1,padding:"8px",borderRadius:8,background:ct.bg,textAlign:"center"}}>
<div style={{fontSize:18,fontWeight:700,color:ct.color}}>{count}</div>
<div style={{fontSize:11,color:ct.color}}>{ct.icon} {e}</div></div>;
})}</div>}

{(f.tareas||[]).length===0?<div style={{textAlign:"center",padding:40,color:"#94a3b8",background:"#f8fafc",borderRadius:12}}>
<div style={{fontSize:40,marginBottom:8}}>\u{1F4CB}</div>
<p style={{fontWeight:600,margin:"0 0 4px"}}>Sin tareas a\u00FAn</p>
<p style={{fontSize:12,margin:0}}>Agrega tareas y as\u00EDgnalas a miembros del equipo</p>
</div>:
<div style={{display:"grid",gap:8}}>
{(f.tareas||[]).map(t=>{const od=t.estado!=="Completada"&&isOverdue(t.fechaFin);const ct=cT(t.estado);
return(<div key={t.id} className={"task-row"+(od?" task-overdue":t.estado==="Completada"?" task-complete":t.estado==="Bloqueada"?" task-blocked":"")}>
<div style={{display:"grid",gap:8}}>
<div style={{display:"flex",gap:8,alignItems:"center"}}>
<input placeholder="T\u00EDtulo de la tarea *" value={t.titulo||""} onChange={e=>upTask(t.id,"titulo",e.target.value)} style={{flex:1,fontSize:13,fontWeight:500}}/>
<button style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16,padding:"2px 6px"}} onClick={()=>rmTask(t.id)}>\u2715</button>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
<div><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:2}}>Responsable</label>
<select value={t.responsableId||""} onChange={e=>assignTask(t.id,e.target.value)} style={{fontSize:12}}>
<option value="">Sin asignar</option>{(f.equipo||[]).map(m=><option key={m.id} value={m.id}>{m.nombre}</option>)}</select></div>
<div><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:2}}>Fecha Inicio</label>
<input type="date" value={t.fechaInicio||""} onChange={e=>upTask(t.id,"fechaInicio",e.target.value)} style={{fontSize:12}}/></div>
<div><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:2}}>Fecha T\u00E9rmino</label>
<input type="date" value={t.fechaFin||""} onChange={e=>upTask(t.id,"fechaFin",e.target.value)} style={{fontSize:12}}/></div>
</div>
<div style={{display:"grid",gridTemplateColumns:"1fr 2fr",gap:8}}>
<div><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:2}}>Estado</label>
<select value={t.estado} onChange={e=>upTask(t.id,"estado",e.target.value)} style={{fontSize:12,background:ct.bg,color:ct.color,fontWeight:600}}>
{TASK_ESTADOS.map(e=><option key={e}>{e}</option>)}</select></div>
<div><label style={{fontSize:11,color:"#94a3b8",display:"block",marginBottom:2}}>Notas</label>
<input placeholder="Notas opcionales..." value={t.notas||""} onChange={e=>upTask(t.id,"notas",e.target.value)} style={{fontSize:12}}/></div>
</div>
{od&&<div style={{fontSize:11,color:"#ef4444",fontWeight:600}}>\u26A0 Esta tarea est\u00E1 vencida (vencimiento: {t.fechaFin})</div>}
</div></div>);})}
</div>}
</div>}

<div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end",borderTop:"1px solid #e2e8f0",paddingTop:16}}>
{ini&&<button className="btn btn-secondary" onClick={()=>onGmail(f)}>\u2709\uFE0F</button>}
<button className="btn btn-secondary" onClick={onClose}>Cancelar</button>
<button className="btn btn-primary" onClick={()=>{if(f.nombre.trim()){const toSave={...f,avance:taskCount>0?autoAvance:(f.avance||0)};onSave(toSave);}}}>
{ini?"Guardar":"Crear"}</button>
</div>
</div></div>);
}

function FormP({per,onSave,onClose}){
const[f,sF]=useState({...per});const set=(k,v)=>sF(x=>({...x,[k]:v}));
return(<div style={{marginTop:16,borderTop:"1px solid #e2e8f0",paddingTop:16}}>
<h3 style={{fontWeight:700,marginBottom:12}}>{per.id?"Editar":"Nueva persona"}</h3>
<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
<div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Nombre</label><input value={f.nombre||""} onChange={e=>set("nombre",e.target.value)}/></div>
<div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Email</label><input type="email" value={f.email||""} onChange={e=>set("email",e.target.value)}/></div>
<div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Rol</label><input value={f.rol||""} onChange={e=>set("rol",e.target.value)}/></div>
<div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Area</label><select value={f.area||AREAS[0]} onChange={e=>set("area",e.target.value)}>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div>
</div>
<div style={{display:"flex",gap:8,marginTop:12}}>
<button className="btn btn-secondary" style={{fontSize:13}} onClick={onClose}>Cancelar</button>
<button className="btn btn-primary" style={{fontSize:13}} onClick={()=>{if(f.nombre?.trim())onSave(f);}}>Guardar</button>
</div></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
