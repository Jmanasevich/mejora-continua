<script type="text/babel">

function sem(i){const h=new Date(),f=new Date(i.fechaCompromiso),a=Number(i.avance)||0;if(i.estado==="Completada")return"ok";if(i.estado==="Bloqueada")return"err";if(f<h&&a<100)return"err";return((f-h)/864e5)<14&&a<70?"warn":"ok";}

function cP(p){return p==="Alta"?{background:"#fee2e2",color:"#991b1b"}:p==="Media"?{background:"#fef9c3",color:"#854d0e"}:{background:"#dcfce7",color:"#166534"};}
function Dot({s}){return <span style={{fontSize:18}}>{s==="ok"?"\u{1F7E2}":s==="warn"?"\u{1F7E1}":"\u{1F534}"}</span>;}
function App(){
 const[tab,sTab]=useState("board"),[ini,sIni]=useState([]),[per,sPer]=useState([]),[load,sLoad]=useState(true),[apiOk,sApiOk]=useState(null),[q,sQ]=useState(""),[fE,sFE]=useState(""),[showF,sShowF]=useState(false),[edit,sEdit]=useState(null),[showP,sShowP]=useState(false),[editP,sEditP]=useState(null),[toast,sToast]=useState(null);
 const msg=(m,t="ok")=>{sToast({m,t});setTimeout(()=>sToast(null),3500);};

 useEffect(()=>{fetch2();},[fetch2]);
 const saveI=async(item)=>{try{if(!item.id)item.id=Date.now().toString();item.historial=(item.historial||"")+"|"+new Date().toLocaleString("es-CL")+":OK";await fetch(API,{method:"POST",body:JSON.stringify({action:"saveIniciativa",iniciativa:item})});await fetch2();msg("Guardada ok");}catch{const l=[...ini];const i=l.findIndex(x=>x.id==item.id);if(i>=0)l[i]=item;else l.push(item);sIni(l);localStorage.setItem("mc_i",JSON.stringify(l));msg("Local","warn");}sShowF(false);sEdit(null);};
 const saveP=async(p)=>{try{if(!p.id)p.id="p"+Date.now();await fetch(API,{method:"POST",body:JSON.stringify({action:"savePersona",persona:p})});await fetch2();msg("OK");}catch{const l=[...per];const i=l.findIndex(x=>x.id==p.id);if(i>=0)l[i]=p;else l.push(p);sPer(l);localStorage.setItem("mc_p",JSON.stringify(l));}sEditP(null);};
 const filtradas=ini.filter(i=>{const qq=q.toLowerCase();return(!qq||i.nombre?.toLowerCase().includes(qq)||i.responsable?.toLowerCase().includes(qq))&&(!fE||i.estado===fE);});
 const venc=ini.filter(i=>{const h=new Date(),f=new Date(i.fechaCompromiso);return f<h&&i.estado!=="Completada"&&i.estado!=="Archivada";});
 const gmail=(i)=>{const pp=per.find(x=>x.nombre===i.responsable);window.open("https://mail.google.com/mail/?view=cm&to="+(pp?.email||"")+"&su="+encodeURIComponent("[MC] "+i.nombre)+"&body="+encodeURIComponent("Hola "+i.responsable+",\nIniciativa: "+i.nombre+"\nEstado: "+i.estado+"\nAvance: "+(i.avance||0)+"%"),"_blank");};
 const acti=ini.filter(i=>i.estado!=="Archivada");

 return(<div style={{minHeight:"100vh",background:"#f8fafc"}}><div style={{background:"white",borderBottom:"1px solid #e2e8f0",position:"sticky",top:0,zIndex:40}}><div style={{maxWidth:1280,margin:"0 auto",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}><div><h1 style={{fontSize:20,fontWeight:800,margin:0}}>\u{1F3ED} Comit\u00e9 Mejora Continua</h1><p style={{fontSize:12,color:"#94a3b8",margin:0}}>In Situ Wines \u00b7 {acti.length} iniciativas</p></div><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:12,padding:"4px 12px",borderRadius:20,...(apiOk?{background:"#dcfce7",color:"#166534"}:{background:"#fee2e2",color:"#991b1b"})}}>{apiOk?"\u25cf Sheets \u2713":"\u25cf Modo local"}</span><button className="btn btn-secondary" onClick={()=>sShowP(true)}>\u{1F465} Personas</button><button className="btn btn-primary" onClick={()=>{sEdit(null);sShowF(true);}}>+ Nueva</button></div></div><div style={{maxWidth:1280,margin:"0 auto",padding:"0 20px",display:"flex",gap:4,borderTop:"1px solid #f1f5f9"}}>{[["board","\u{1F4CB} Board"],["tabla","\u{1F4CA} Tabla"],["alertas","\u{1F6A8} Alertas"+(venc.length?" ("+venc.length+")":"")]].map(([k,v])=>(<button key={k} onClick={()=>sTab(k)} style={{padding:"10px 12px",background:"none",border:"none",borderBottom:tab===k?"3px solid #2563eb":"3px solid transparent",color:tab===k?"#2563eb":"#64748b",fontWeight:tab===k?700:400,cursor:"pointer",fontSize:14}}>{v}</button>))}</div></div><div style={{maxWidth:1280,margin:"0 auto",padding:"16px 20px"}}><div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}><input style={{flex:1,minWidth:200}} placeholder="\u{1F50D} Buscar..." value={q} onChange={e=>sQ(e.target.value)}/><select style={{width:170}} value={fE} onChange={e=>sFE(e.target.value)}><option value="">Todos estados</option>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select><button className="btn btn-secondary" onClick={fetch2}>\u21BB Sync</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:12,marginBottom:20}}>{[["Total",acti.length,"#eff6ff","#1e40af"],["En Progreso",ini.filter(i=>i.estado==="En Progreso").length,"#fefce8","#92400e"],["Completadas",ini.filter(i=>i.estado==="Completada").length,"#f0fdf4","#14532d"],["Vencidas",venc.length,"#fef2f2","#991b1b"]].map(([l,v,bg,c])=>(<div key={l} style={{background:bg,borderRadius:14,padding:"16px 20px",textAlign:"center"}}><div style={{fontSize:32,fontWeight:800,color:c}}>{v}</div><div style={{fontSize:13,color:c,fontWeight:600,marginTop:4}}>{l}</div></div>))}</div>{tab==="board"&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(220px,1fr))",gap:16}}>{grupos.map(({estado,items})=>(<div key={estado}><div className="badge" style={{width:"100%",textAlign:"center",padding:"8px",marginBottom:10,display:"block",...cE(estado)}}>{estado} ({items.length})</div>{items.map(i=>(<div key={i.id} className="card" style={{cursor:"pointer"}} onClick={()=>{sEdit(i);sShowF(true);}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span className="badge" style={cP(i.prioridad)}>{i.prioridad}</span><Dot s={sem(i)}/></div><p style={{fontWeight:600,fontSize:13,marginBottom:4}}>{i.nombre}</p><p style={{fontSize:12,color:i.responsable?"#64748b":"#f87171",marginBottom:8}}>{i.responsable||"\u26A0\uFE0F Sin responsable"}</p>{(i.equipo||[]).length>0&&<p style={{fontSize:10,color:"#2563eb",marginBottom:4}}>\u{1F465} {(i.equipo||[]).length} miembros</p>}<div className="progress-bar"><div className="progress-fill" style={{width:(i.avance||0)+"%",background:"#3b82f6"}}></div></div><p style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{i.avance||0}% \u00b7 {i.fechaCompromiso}</p></div>))}</div>))}</div>}{tab==="tabla"&&<div className="card" style={{padding:0,overflow:"hidden"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}><thead><tr style={{background:"#f8fafc",borderBottom:"2px solid #e2e8f0"}}>{["","Iniciativa","Responsable","Equipo","Estado","Avance","Fecha",""].map(h=><th key={h} style={{padding:"12px 14px",textAlign:"left",fontWeight:600,color:"#475569"}}>{h}</th>)}</tr></thead><tbody>{filtradas.filter(i=>i.estado!=="Archivada").map((i,idx)=>(<tr key={i.id} style={{borderBottom:"1px solid #f1f5f9",background:idx%2===0?"white":"#fafafa"}}><td style={{padding:"10px 14px"}}><Dot s={sem(i)}/></td><td style={{padding:"10px 14px",fontWeight:600}}>{i.nombre}</td><td style={{padding:"10px 14px",color:i.responsable?"#475569":"#f87171"}}>{i.responsable||"Sin asignar"}</td><td style={{padding:"10px 14px",fontSize:11,color:"#2563eb"}}>{(i.equipo||[]).length>0?(i.equipo||[]).length+" miembros":"-"}</td><td style={{padding:"10px 14px"}}><span className="badge" style={cE(i.estado)}>{i.estado}</span></td><td style={{padding:"10px 14px"}}><div style={{display:"flex",alignItems:"center",gap:8}}><div className="progress-bar" style={{width:60}}><div className="progress-fill" style={{width:(i.avance||0)+"%",background:"#3b82f6"}}></div></div><span style={{fontSize:11,color:"#94a3b8"}}>{i.avance||0}%</span></div></td><td style={{padding:"10px 14px",color:"#94a3b8",fontSize:12}}>{i.fechaCompromiso}</td><td style={{padding:"10px 14px"}}><div style={{display:"flex",gap:6}}><button className="btn btn-secondary" style={{padding:"4px 10px",fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>\u270F\uFE0F</button><button className="btn btn-secondary" style={{padding:"4px 10px",fontSize:12}} onClick={()=>gmail(i)}>\u2709\uFE0F</button></div></td></tr>))}</tbody></table></div>}{tab==="alertas"&&<div><h2 style={{fontWeight:700,color:"#991b1b",marginBottom:12}}>\u{1F534} Vencidas/Bloqueadas</h2>{venc.length===0?<div className="card" style={{textAlign:"center",color:"#166534",background:"#f0fdf4",padding:40}}>\u2705 Sin alertas</div>:[...new Map([...venc,...ini.filter(i=>i.estado==="Bloqueada")].map(i=>[i.id,i])).values()].map(i=>(<div key={i.id} className="card" style={{borderLeft:"4px solid #f87171",display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}><div><p style={{fontWeight:700,margin:"0 0 4px"}}>{i.nombre}</p><p style={{fontSize:13,color:"#64748b",margin:0}}>{i.responsable||"Sin responsable"} \u00b7 {i.fechaCompromiso} \u00b7 {i.avance||0}%</p></div><div style={{display:"flex",gap:8,marginLeft:12}}><button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>\u270F\uFE0F</button><button className="btn btn-secondary" style={{fontSize:12}} onClick={()=>gmail(i)}>\u2709\uFE0F</button></div></div>))}<h2 style={{fontWeight:700,color:"#92400e",margin:"24px 0 12px"}}>\u26A0\uFE0F Sin responsable</h2>{ini.filter(i=>!i.responsable&&i.estado!=="Archivada").map(i=>(<div key={i.id} className="card" style={{borderLeft:"4px solid #fbbf24",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><p style={{fontWeight:700,margin:"0 0 4px"}}>{i.nombre}</p><p style={{fontSize:13,color:"#64748b",margin:0}}>{i.area} \u00b7 {i.estado}</p></div><button className="btn btn-primary" style={{fontSize:12}} onClick={()=>{sEdit(i);sShowF(true);}}>Asignar</button></div>))}</div>}</div>{showF&&<FormI ini={edit} per={per} onSave={saveI} onClose={()=>{sShowF(false);sEdit(null);}} onGmail={gmail}/>}{showP&&<div className="modal-overlay" onClick={()=>sShowP(false)}><div className="modal" style={{maxWidth:700}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><h2 style={{fontWeight:800,fontSize:18,margin:0}}>\u{1F465} Directorio</h2><div style={{display:"flex",gap:8}}><button className="btn btn-primary" style={{fontSize:13}} onClick={()=>sEditP({})}>+ Agregar</button><button onClick={()=>sShowP(false)} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:"#94a3b8"}}>\u00d7</button></div></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:12}}>{per.map(p=>(<div key={p.id} className="card" style={{margin:0,display:"flex",justifyContent:"space-between"}}><div><p style={{fontWeight:700,margin:"0 0 2px"}}>{p.nombre}</p><p style={{fontSize:12,color:"#64748b",margin:"0 0 2px"}}>{p.rol}</p><p style={{fontSize:12,color:"#2563eb",margin:0}}>{p.email||<span style={{color:"#f87171"}}>Sin email</span>}</p></div><button className="btn btn-secondary" style={{fontSize:12,padding:"4px 8px"}} onClick={()=>sEditP(p)}>\u270F\uFE0F</button></div>))}</div>{editP!==null&&<FormP per={editP} onSave={saveP} onClose={()=>sEditP(null)}/>}</div></div>}{toast&&<div style={{position:"fixed",bottom:28,right:28,padding:"14px 24px",borderRadius:14,fontWeight:700,fontSize:14,zIndex:100,background:toast.t==="ok"?"#16a34a":"#d97706",color:"white"}}>{toast.m}</div>}</div>);}
function FormI({ini,per,onSave,onClose,onGmail}){
 const E={nombre:"",responsable:"",area:"Operaciones",prioridad:"Alta",estado:"No Iniciada",avance:0,fechaCompromiso:"",observaciones:"",equipo:[],tareas:{}};
 const[f,sF]=useState(ini?{...ini,equipo:ini.equipo||[],tareas:ini.tareas||{}}:E);const set=(k,v)=>sF(x=>({...x,[k]:v}));
 const addMember=()=>{const m={id:Date.now().toString(),nombre:"",rol:""};sF(x=>({...x,equipo:[...(x.equipo||[]),m],tareas:{...x.tareas,[m.id]:[]}}));};
 const rmMember=(id)=>{sF(x=>{const eq=(x.equipo||[]).filter(m=>m.id!==id);const t={...x.tareas};delete t[id];return{...x,equipo:eq,tareas:t};});};
 const upMember=(id,k,v)=>{sF(x=>({...x,equipo:(x.equipo||[]).map(m=>m.id===id?{...m,[k]:v}:m)}));};
 const addTask=(mid)=>{sF(x=>({...x,tareas:{...x.tareas,[mid]:[...(x.tareas[mid]||[]),{id:Date.now().toString(),desc:"",estado:"Por hacer"}]}}));};
 const rmTask=(mid,tid)=>{sF(x=>({...x,tareas:{...x.tareas,[mid]:(x.tareas[mid]||[]).filter(t=>t.id!==tid)}}));};
 const upTask=(mid,tid,k,v)=>{sF(x=>({...x,tareas:{...x.tareas,[mid]:(x.tareas[mid]||[]).map(t=>t.id===tid?{...t,[k]:v}:t)}}));};
 return(<div className="modal-overlay" onClick={onClose}><div className="modal" style={{maxWidth:700}} onClick={e=>e.stopPropagation()}><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h2 style={{fontWeight:800,fontSize:18,margin:0}}>{ini?"\u270F\uFE0F Editar":"+ Nueva iniciativa"}</h2><button onClick={onClose} style={{background:"none",border:"none",fontSize:28,cursor:"pointer",color:"#94a3b8"}}>\u00d7</button></div><div style={{display:"grid",gap:12}}><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Nombre *</label><input value={f.nombre} onChange={e=>set("nombre",e.target.value)} placeholder="Nombre"/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Responsable</label><select value={f.responsable} onChange={e=>set("responsable",e.target.value)}><option value="">Sin asignar</option>{per.map(p=><option key={p.id} value={p.nombre}>{p.nombre}</option>)}</select></div><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>\u00c1rea</label><select value={f.area} onChange={e=>set("area",e.target.value)}>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Estado</label><select value={f.estado} onChange={e=>set("estado",e.target.value)}>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Prioridad</label><select value={f.prioridad} onChange={e=>set("prioridad",e.target.value)}>{PRIOS.map(pp=><option key={pp}>{pp}</option>)}</select></div></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Avance: {f.avance}%</label><input type="range" min="0" max="100" value={f.avance} onChange={e=>set("avance",Number(e.target.value))} style={{border:"none",padding:"8px 0",background:"none",width:"100%"}}/></div><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Fecha</label><input type="date" value={f.fechaCompromiso} onChange={e=>set("fechaCompromiso",e.target.value)}/></div></div><div><label style={{display:"block",fontSize:13,fontWeight:500,marginBottom:4}}>Observaciones</label><textarea value={f.observaciones} onChange={e=>set("observaciones",e.target.value)} rows={3}/></div><div style={{borderTop:"2px solid #e2e8f0",paddingTop:12,marginTop:4}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}><span style={{fontSize:14,fontWeight:700}}>\u{1F465} Equipo de Trabajo</span><button className="btn btn-primary" style={{fontSize:12,padding:"4px 12px"}} onClick={addMember}>+ Miembro</button></div>{(f.equipo||[]).length===0&&<p style={{fontSize:12,color:"#94a3b8",textAlign:"center",padding:8}}>Sin miembros a\u00fan. Agrega miembros al equipo.</p>}{(f.equipo||[]).map(mb=>(<div key={mb.id} className="team-card"><div style={{display:"flex",gap:8,marginBottom:6}}><input placeholder="Nombre" value={mb.nombre} onChange={e=>upMember(mb.id,"nombre",e.target.value)} style={{flex:1,fontSize:12}}/><input placeholder="Rol" value={mb.rol} onChange={e=>upMember(mb.id,"rol",e.target.value)} style={{flex:1,fontSize:12}}/><button className="btn btn-secondary" style={{padding:"2px 8px",fontSize:11,color:"#ef4444"}} onClick={()=>rmMember(mb.id)}>\u2715</button></div><div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}><span style={{fontSize:11,fontWeight:600,color:"#64748b"}}>Tareas ({(f.tareas[mb.id]||[]).length})</span><button style={{background:"none",border:"none",color:"#2563eb",fontSize:11,cursor:"pointer",fontWeight:600}} onClick={()=>addTask(mb.id)}>+ Tarea</button></div>{(f.tareas[mb.id]||[]).map(tk=>(<div key={tk.id} className="task-row" styl function FormP({per,onSave,onClose}){
 const[f,sF]=useState({...per});const set=(k,v)=>sF(x=>({...x,[k]:v}));
 return(<div style={{marginTop:16,borderTop:"1px solid #e2e8f0",paddingTop:16}}><h3 style={{fontWeight:700,marginBottom:12}}>{per.id?"Editar":"Nueva persona"}</h3><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Nombre</label><input value={f.nombre||""} onChange={e=>set("nombre",e.target.value)}/></div><div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Email</label><input type="email" value={f.email||""} onChange={e=>set("email",e.target.value)}/></div><div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Rol</label><input value={f.rol||""} onChange={e=>set("rol",e.target.value)}/></div><div><label style={{display:"block",fontSize:12,color:"#94a3b8",marginBottom:4}}>Area</label><select value={f.area||AREAS[0]} onChange={e=>set("area",e.target.value)}>{AREAS.map(a=><option key={a}>{a}</option>)}</select></div></div><div style={{display:"flex",gap:8,marginTop:12}}><button className="btn btn-secondary" style={{fontSize:13}} onClick={onClose}>Cancelar</button><button className="btn btn-primary" style={{fontSize:13}} onClick={()=>{if(f.nombre?.trim())onSave(f);}}>Guardar</button></div></div>);}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
